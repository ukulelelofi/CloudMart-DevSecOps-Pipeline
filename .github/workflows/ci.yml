# ============================================
# Trigger CI only for feature development
# and Pull Requests into main.
# Deployment to main is handled by cd.yml.
# ============================================
name: CloudMart CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches:
      - "feature/**"
      - "hotfix/**"

# Required permissions for GitHub Security features
permissions:
  security-events: write
  actions: read
  contents: read

# CI pipeline validates code quality and security.
# No deployment occurs in this workflow.
jobs:
  ci-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Pipeline Start
        run: echo "Starting CloudMart CI Pipeline"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          PYTHONPATH=. pytest

      # Scan the repository for hardcoded secrets such as API keys,
      # passwords, tokens, and credentials before continuing the pipeline.
      # The workflow will fail if any secrets are detected.
      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_SUMMARY: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
    
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Build Docker Image
        run: docker build -t cloudmart:${{ github.sha }} .

      # Scan the built Docker image for vulnerabilities.
      # For demo purposes, findings are reported but do not fail the pipeline.
      # In production, exit-code should be changed to "1" to block HIGH/CRITICAL vulnerabilities.
      - name: Run Trivy Container Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "cloudmart:${{ github.sha }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      # Generate audit evidence for compliance and traceability
      - name: Generate Audit Evidence
        run: |
          mkdir -p reports
          echo "CloudMart CI Pipeline executed successfully." > reports/audit-evidence.txt
          echo "Commit SHA: ${{ github.sha }}" >> reports/audit-evidence.txt
          echo "Branch: ${{ github.ref_name }}" >> reports/audit-evidence.txt

      - name: Upload Audit Evidence Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudmart-ci-audit-evidence
          path: reports/audit-evidence.txt

      - name: CI Release Gate
        run: |
          echo "========================================"
          echo "      CloudMart CI Release Gate"
          echo "========================================"
          echo "✓ Unit tests passed"
          echo "✓ Secret scan passed"
          echo "✓ SAST completed"
          echo "✓ Dependency scan completed"
          echo "✓ Docker image built"
          echo "✓ Container scan completed"
          echo "✓ Audit evidence generated"
          echo ""
          echo "Status: CI PASSED - READY FOR PR REVIEW"
          echo "Deployment is handled separately by CD pipeline."
          echo "========================================"

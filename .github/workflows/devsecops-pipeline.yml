name: CloudMart DevSecOps Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  devsecops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Display Pipeline Start
        run: echo "Starting CloudMart DevSecOps Pipeline"

      - name: Build Stage
        run: echo "Building application..."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          PYTHONPATH=. pytest

      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST Scan
        run: echo "Running Static Application Security Testing..."

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'

      - name: Container Image Scan
        run: echo "Scanning container image..."

      - name: IaC Scan
        run: echo "Scanning Infrastructure as Code..."

      - name: Generate Audit Evidence
        run: |
          mkdir -p reports
          echo "CloudMart DevSecOps Pipeline executed successfully." > reports/audit-evidence.txt

      - name: Pipeline Completed
        run: echo "Pipeline completed successfully."

name: CloudMart CD Pipeline

# ============================================
# Continuous Delivery (CD) Pipeline
# This workflow runs only after code is merged
# into the main branch.
#
# CI validates code quality and security.
# CD is responsible for deployment.
# ============================================
on:
  push:
    branches: [ "main" ]

# Read-only permission is sufficient because
# this workflow only deploys application artifacts.
permissions:
  contents: read

jobs:

  # ============================================
  # Stage 1 - Deploy to Development
  # Deploy the validated application and perform
  # basic smoke testing.
  # ============================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Dev
        run: echo "Deploying CloudMart to Dev environment..."

      - name: Dev Smoke Test
        run: echo "Running Dev smoke test..."

  # ============================================
  # Stage 2 - Deploy to UAT
  # This stage requires manual approval using
  # GitHub Environments before deployment.
  # ============================================
  deploy-uat:
    name: Deploy to UAT
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: uat

    steps:
      - name: Deploy to UAT
        run: echo "Deploying CloudMart to UAT after manual approval..."

      - name: UAT Smoke Test
        run: echo "Running UAT smoke test..."

  # ============================================
  # Stage 3 - Deploy to Production
  # Production deployment requires a second
  # manual approval before release.
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-uat
    environment: production

    steps:
      - name: Deploy to Production
        run: echo "Deploying CloudMart to Production after approval..."

      - name: Production Validation
        run: echo "Validating Production deployment..."

